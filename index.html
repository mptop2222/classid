<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生學號辨識系統 - 優化版</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        #video-container { position: relative; display: inline-block; width: 100%; max-width: 500px; }
        video { width: 100%; border-radius: 10px; background: #000; }
        /* 綠框區域：這不僅是視覺導引，也是我們實際擷取的範圍 */
        #overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 20%; border: 3px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.5); 
            pointer-events: none;
        }
        #result-panel { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .student-info { font-size: 1.5rem; font-weight: bold; color: #2c3e50; margin-top: 10px; }
        #log-table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        #log-table th, #log-table td { border: 1px solid #ddd; padding: 12px; }
        #log-table th { background-color: #eee; }
        /* 用於偵錯的隱形畫布，若要看截取畫面可把 display 改為 block */
        #debug-canvas { display: none; margin: 10px auto; border: 1px solid red; }
    </style>
</head>
<body>

    <h2>🏫 學生進出辨識系統</h2>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <canvas id="debug-canvas"></canvas>

    <div id="result-panel">
        <p>狀態: <span id="status">準備中...</span></p>
        <div class="student-info" id="student-display">請將學號對準綠框</div>
    </div>

    <h3>今日掃描記錄</h3>
    <table id="log-table">
        <thead>
            <tr>
                <th>時間</th>
                <th>學號</th>
                <th>班級</th>
                <th>姓名</th>
            </tr>
        </thead>
        <tbody id="log-body"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDIBZcv7FDus86ItqMNdGaTGLFUH9TkGg", 
            authDomain: "new123-88ala.firebaseapp.com",
            databaseURL: "https://new123-88ala-default-rtdb.firebaseio.com",
            projectId: "new123-88ala",
            storageBucket: "new123-88ala.appspot.com",
            messagingSenderId: "1098459270837",
            appId: "1:1098459270837:web:51532d8f2cffbf9271b8fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 學生資料庫
        const studentDB = {
            "112001": { name: "王小明", class: "高一甲班" },
            "112002": { name: "李大華", class: "高一乙班" },
            "112003": { name: "張美美", class: "高二丙班" }
        };

        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const display = document.getElementById('student-display');
        const logBody = document.getElementById('log-body');
        const debugCanvas = document.getElementById('debug-canvas');

        // 啟動攝影機
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
                status.innerText = "掃描中...";
                startRecognition();
            } catch (err) {
                status.innerText = "相機啟動失敗: " + err.message;
            }
        }

        // 執行 OCR 辨識
        async function startRecognition() {
            const context = debugCanvas.getContext('2d');

            setInterval(async () => {
                if (video.videoWidth === 0) return;

                // 核心改進：計算綠框在影片中的實際座標 (對應 CSS 的 70% 寬, 20% 高)
                const cropWidth = video.videoWidth * 0.7;
                const cropHeight = video.videoHeight * 0.2;
                const startX = (video.videoWidth - cropWidth) / 2;
                const startY = (video.videoHeight - cropHeight) / 2;

                debugCanvas.width = cropWidth;
                debugCanvas.height = cropHeight;

                // 僅擷取綠框區域的影像
                context.drawImage(video, startX, startY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

                try {
                    // 核心改進：使用 Tesseract 單行辨識模式 (PSM 7)
                    const { data: { text } } = await Tesseract.recognize(debugCanvas, 'eng', {
                        tessedit_char_whitelist: '0123456789',
                        tessedit_pageseg_mode: '7' 
                    });

                    const cleanText = text.replace(/\s/g, '');
                    if (cleanText) {
                        checkStudent(cleanText);
                    }
                } catch (error) {
                    console.error("OCR 錯誤:", error);
                }
            }, 1500); // 縮短掃描間隔到 1.5 秒
        }

        let lastScannedId = "";
        let lastScanTime = 0;
        const COOLDOWN_MS = 5000; 

        function checkStudent(id) {
            if (studentDB[id]) {
                const now = Date.now();
                if (id === lastScannedId && (now - lastScanTime) < COOLDOWN_MS) return;

                lastScannedId = id;
                lastScanTime = now;

                const info = studentDB[id];
                display.innerText = `${info.class} - ${info.name}`;
                display.style.color = "#27ae60"; // 成功辨識變綠色
                
                addLog(id, info);
                
                // 3秒後恢復顏色
                setTimeout(() => { display.style.color = "#2c3e50"; }, 3000);
            }
        }

        function addLog(id, info) {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            
            const row = `<tr>
                <td>${timeString}</td>
                <td>${id}</td>
                <td>${info.class}</td>
                <td>${info.name}</td>
            </tr>`;
            logBody.insertAdjacentHTML('afterbegin', row);

            const logsRef = ref(db, 'scan_logs');
            push(logsRef, {
                timestamp: now.toISOString(),
                studentId: id,
                className: info.class,
                name: info.name
            }).catch(e => console.error("Firebase 寫入失敗", e));
        }

        setupCamera();
    </script>
</body>
</html>
